<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryzen Graphics | Luxury Car Showroom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .car-card:hover .car-image {
            transform: scale(1.05);
        }

        .car-image {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 80vh;
            overflow: hidden;
        }

        video {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        .gradient-overlay {
            background: linear-gradient(0deg, #0a0a0a 0%, rgba(10, 10, 10, 0.4) 100%);
        }

        .nav-link::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: #e11d48;
            transition: width .3s;
        }
        .nav-link:hover::after {
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter text-rose-600">RYZEN GRAPHICS</div>
        <div class="hidden md:flex space-x-8 font-medium">
            <a href="#home" class="nav-link">Home</a>
            <a href="#showroom" class="nav-link">Showroom</a>
            <a href="#contact" class="nav-link">Contact</a>
        </div>
        <a href="tel:+255782687045" class="bg-rose-600 hover:bg-rose-700 px-5 py-2 rounded-full text-sm font-bold transition">
            Call Now
        </a>
    </nav>

    <!-- Hero Section with BMW M5 Video -->
    <section id="home" class="video-container">
        <!-- Featuring cinematic footage of a sports car/M5 equivalent -->
        <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-sports-car-driving-away-at-night-34440-large.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/40 gradient-overlay flex flex-col justify-center items-center text-center px-4">
            <div class="mb-2 text-rose-600 font-bold tracking-[0.3em] uppercase">Ryzen Graphics Presents</div>
            <h1 class="text-5xl md:text-8xl font-black mb-4 uppercase italic leading-tight">BMW M5 <br><span class="text-rose-600">Competition</span></h1>
            <p class="text-xl text-gray-300 max-w-2xl">The ultimate driving machine. Experience unrivaled power and luxury at our exclusive showroom.</p>
            <div class="flex flex-wrap justify-center gap-4 mt-8">
                <a href="#showroom" class="bg-white text-black hover:bg-rose-600 hover:text-white px-8 py-3 font-bold transition-all duration-300">
                    EXPLORE COLLECTION
                </a>
                <button onclick="document.getElementById('promo-video').scrollIntoView()" class="border-2 border-white/30 hover:border-white px-8 py-3 font-bold transition-all duration-300 backdrop-blur-sm">
                    WATCH VIDEO
                </button>
            </div>
        </div>
    </section>

    <!-- Showroom Grid -->
    <section id="showroom" class="py-24 px-6 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
            <div>
                <h2 class="text-4xl font-bold mb-2 text-white">The Ryzen Collection</h2>
                <p class="text-gray-400">Hand-picked excellence, ready for delivery.</p>
            </div>
            <div class="flex space-x-2">
                <button class="p-3 border border-gray-700 rounded-full hover:bg-gray-800 transition"><i class="fas fa-chevron-left"></i></button>
                <button class="p-3 border border-gray-700 rounded-full hover:bg-gray-800 transition"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="carGrid">
            <!-- Car cards will be injected here via JS -->
        </div>
    </section>
