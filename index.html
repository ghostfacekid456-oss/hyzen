<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthly - Ryzen James Ruzige</title>
    <style>
        :root {
            --nature-green: #2ecc71;
            --ocean-blue: #3498db;
            --earth-brown: #e67e22;
            --sky-purple: #9b59b6;
            --ice-blue: #1abc9c;
            --lava-red: #e74c3c;
            --bg: #f8faf8;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --ryzen-gold: #f1c40f;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            width: 100%;
            padding: 120px 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        header h1 { font-size: 3.5rem; margin: 0; letter-spacing: -1px; }
        .owner-badge {
            background: var(--nature-green);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-block;
            margin-top: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .ai-box {
            background: white;
            width: 90%;
            max-width: 850px;
            margin: -60px auto 40px;
            padding: 35px;
            border-radius: 28px;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .owner-intro {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .owner-intro h2 { font-size: 1.8rem; color: #1a2a1a; margin-bottom: 5px; }
        .owner-intro p { color: var(--nature-green); font-weight: 600; font-size: 1.1rem; }

        .input-group {
            display: flex;
            gap: 12px;
        }

        #aiInput {
            flex-grow: 1;
            padding: 18px 24px;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        #aiInput:focus { border-color: var(--nature-green); background: #f9fff9; }

        #askBtn {
            background: var(--nature-green);
            color: white;
            border: none;
            padding: 0 32px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        #askBtn:hover {
            background: #27ae60;
            transform: scale(1.02);
        }

        .timeline-section {
            width: 90%;
            max-width: 1200px;
            margin-bottom: 80px;
        }

        .section-title {
            margin-bottom: 40px;
            text-align: center;
        }

        .section-title h3 {
            font-size: 2.2rem;
            color: #1a2a1a;
            border-bottom: 4px solid var(--nature-green);
            display: inline-block;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .feature-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .feature-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .feature-img {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
        }

        .feature-info { padding: 20px; }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .category-water { background: var(--ocean-blue); }
        .category-land { background: var(--earth-brown); }
        .category-ice { background: var(--ice-blue); }
        .category-tectonic { background: var(--lava-red); }

        .location { font-size: 0.8rem; color: #888; margin-bottom: 5px; display: block; }
        h4 { margin: 0 0 10px; font-size: 1.2rem; }
        p { font-size: 0.9rem; color: #555; line-height: 1.5; }

        /* RYZEN GRAPHICS FOOTER */
        footer {
            width: 100%;
            padding: 60px 20px;
            background: #0f170f;
            color: white;
            text-align: center;
            border-top: 5px solid var(--nature-green);
        }

        .footer-logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: white;
            margin-bottom: 10px;
            display: block;
        }

        .footer-logo span {
            color: var(--nature-green);
        }

        .footer-tagline {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: block;
        }

        .footer-divider {
            width: 50px;
            height: 2px;
            background: var(--nature-green);
            margin: 20px auto;
        }

        .owner-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: #ddd;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nature's Masterpieces</h1>
        <div class="owner-badge">Curated by Ryzen James Ruzige</div>
    </header>

    <div class="ai-box">
        <div class="owner-intro">
            <h2>The Explorer's Portal</h2>
            <p>Discover the Earth with Ryzen James Ruzige</p>
        </div>
        <div class="input-group">
            <input type="text" id="aiInput" placeholder="Search for a wonder (e.g. 'Everest', 'Reef')...">
            <button id="askBtn">Explore</button>
        </div>
        <div id="aiResponse" style="margin-top:20px; display:none; text-align:left; padding:15px; background:#f0f7f0; border-radius:10px;"></div>
    </div>

    <div id="timelineContainer"></div>

    <footer>
        <div class="footer-logo">RYZEN <span>GRAPHICS</span></div>
        <div class="footer-tagline">Visualizing the Natural World</div>
        <div class="footer-divider"></div>
        <p class="owner-name">Design & Content by Ryzen James Ruzige</p>
        <p style="font-size: 0.8rem; color: #555; margin-top: 10px;">&copy; 2024 All Rights Reserved</p>
    </footer>

    <script>
        const featureData = [
            {
                section: "Colossal Summits",
                items: [
                    { title: "Mount Everest", location: "Nepal/China", category: "land", image: "https://images.unsplash.com/photo-1544735716-392fe2489ffa?auto=format&fit=crop&w=600&q=80", description: "The highest point on Earth, standing at 29,032 feet above sea level.", fact: "It grows about 4mm taller every year due to tectonic shifts." },
                    { title: "Mount Kilimanjaro", location: "Tanzania", category: "land", image: "https://images.unsplash.com/photo-1589553416260-1710c9164088?auto=format&fit=crop&w=600&q=80", description: "The highest free-standing mountain in the world and a dormant volcano.", fact: "It has three volcanic cones: Kibo, Mawenzi, and Shira." }
                ]
            },
            {
                section: "Aquatic Marvels",
                items: [
                    { title: "Great Barrier Reef", location: "Australia", category: "water", image: "https://images.unsplash.com/photo-1582967788606-a171c1080cb0?auto=format&fit=crop&w=600&q=80", description: "The world's largest coral reef system, visible even from outer space.", fact: "It is composed of over 2,900 individual reefs." },
                    { title: "Victoria Falls", location: "Zambia/Zimbabwe", category: "water", image: "https://images.unsplash.com/photo-1629124403816-1f7292211e93?auto=format&fit=crop&w=600&q=80", description: "Known as 'The Smoke That Thunders', it is the largest curtain of falling water.", fact: "The noise of the water can be heard from 40km away." }
                ]
            },
            {
                section: "Deep Earth & Ice",
                items: [
                    { title: "Grand Canyon", location: "Arizona, USA", category: "tectonic", image: "https://images.unsplash.com/photo-1474044159687-1ee9f3a51722?auto=format&fit=crop&w=600&q=80", description: "A massive gorge carved by the Colorado River over millions of years.", fact: "The canyon exposes nearly two billion years of Earth's history." },
                    { title: "Perito Moreno Glacier", location: "Argentina", category: "ice", image: "https://images.unsplash.com/photo-1513028738826-f083face353e?auto=format&fit=crop&w=600&q=80", description: "One of the few glaciers in the world that is actually still growing.", fact: "It is the world's third largest reserve of fresh water." }
                ]
            },
            {
                section: "Unique Landscapes",
                items: [
                    { title: "Salar de Uyuni", location: "Bolivia", category: "land", image: "https://images.unsplash.com/photo-1520038410233-7141be7e6f97?auto=format&fit=crop&w=600&q=80", description: "The world's largest salt flat, creating a perfect mirror when covered in water.", fact: "It contains 50% to 70% of the world's known lithium reserves." },
                    { title: "Pamukkale", location: "Turkey", category: "water", image: "https://images.unsplash.com/photo-1527113427923-01777265a78f?auto=format&fit=crop&w=600&q=80", description: "Stunning white travertine terraces filled with mineral-rich thermal waters.", fact: "The name literally means 'Cotton Castle' in Turkish." }
                ]
            }
        ];

        const container = document.getElementById('timelineContainer');
        const aiInput = document.getElementById('aiInput');
        const askBtn = document.getElementById('askBtn');
        const aiResponse = document.getElementById('aiResponse');

        function render(filter = "") {
            container.innerHTML = "";
            const term = filter.toLowerCase();
            featureData.forEach(sec => {
                const items = sec.items.filter(i => i.title.toLowerCase().includes(term));
                if (items.length > 0) {
                    const s = document.createElement('div');
                    s.className = 'timeline-section';
                    s.innerHTML = `<div class="section-title"><h3>${sec.section}</h3></div>`;
                    const g = document.createElement('div');
                    g.className = 'grid';
                    items.forEach(i => {
                        g.innerHTML += `
                            <div class="feature-card">
                                <div class="feature-img" style="background-image:url('${i.image}')"></div>
                                <div class="feature-info">
                                    <span class="tag category-${i.category}">${i.category}</span>
                                    <span class="location">${i.location}</span>
                                    <h4>${i.title}</h4>
                                    <p>${i.description}</p>
                                    <p style="font-size:0.8rem; color:var(--nature-green); margin-top:10px;"><strong>Fact:</strong> ${i.fact}</p>
                                </div>
                            </div>`;
                    });
                    s.appendChild(g);
                    container.appendChild(s);
                }
            });
        }

        askBtn.onclick = () => {
            const val = aiInput.value;
            aiResponse.style.display = "block";
            aiResponse.innerHTML = `<strong>Ryzen's Explorer AI:</strong> Showing results for "${val}"...`;
            render(val);
        };

        render();
    </script>
</body>
</html>
