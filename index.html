<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthly - AI Nature Guide</title>
    <style>
        :root {
            --nature-green: #27ae60;
            --ocean-blue: #2980b9;
            --earth-brown: #795548;
            --bg: #f0f4f0;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hero Section */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            width: 100%;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* AI Assistant Box */
        .ai-box {
            background: white;
            width: 90%;
            max-width: 700px;
            margin: -40px auto 30px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--nature-green);
            font-weight: bold;
        }

        .ai-avatar {
            width: 40px;
            height: 40px;
            background: var(--nature-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        #aiInput {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        #aiResponse {
            margin-top: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            font-style: italic;
            display: none;
            border-left: 4px solid var(--nature-green);
        }

        /* Feature Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 50px;
        }

        .feature-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-info {
            padding: 20px;
        }

        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            background: var(--nature-green);
        }

        .category-water { background: var(--ocean-blue); }
        .category-land { background: var(--earth-brown); }
        .category-fire { background: #e67e22; }

        h2 { margin: 10px 0; color: var(--primary); }
        p { color: #666; line-height: 1.6; }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Earthly Nature Guide</h1>
        <p>Your AI-powered encyclopedia of the natural world</p>
    </header>

    <div class="ai-box">
        <div class="ai-header">
            <div class="ai-avatar">🍃</div>
            <span>Nature Assistant</span>
        </div>
        <input type="text" id="aiInput" placeholder="Ask me about Volcanoes, Rainforests, or Oceans...">
        <div id="aiResponse"></div>
    </div>

    <div class="grid" id="featureGrid">
        <!-- Natural features will appear here -->
    </div>

    <footer>
        &copy; 2024 Earthly Nature Project - Built for Learning
    </footer>

    <script>
        // Large Database of Earth's Natural Features
        const features = [
            {
                title: "Volcanoes",
                category: "fire",
                description: "An opening in the Earth's crust through which lava, ash, and gases erupt.",
                fact: "The largest volcano on Earth is Mauna Loa in Hawaii."
            },
            {
                title: "Canyons",
                category: "land",
                description: "Deep valleys with very steep sides, often carved by river erosion over millions of years.",
                fact: "The Grand Canyon is 277 miles long and over a mile deep."
            },
            {
                title: "Glaciers",
                category: "water",
                description: "Huge masses of ice that move slowly over land, shaping the landscape.",
                fact: "Glaciers store about 69% of the world's fresh water."
            },
            {
                title: "Rainforests",
                category: "land",
                description: "Dense forests characterized by high rainfall and incredible biodiversity.",
                fact: "Rainforests are often called the 'Lungs of the Planet'."
            },
            {
                title: "Coral Reefs",
                category: "water",
                description: "Underwater ecosystems held together by calcium carbonate structures secreted by corals.",
                fact: "They support 25% of all marine life despite covering only 1% of the ocean floor."
            },
            {
                title: "Waterfalls",
                category: "water",
                description: "Rivers or other bodies of water falling over a rocky ledge into a plunge pool below.",
                fact: "Angel Falls in Venezuela is the highest waterfall in the world."
            },
            {
                title: "Deserts",
                category: "land",
                description: "Barren areas of landscape where little precipitation occurs and conditions are hostile for plant life.",
                fact: "Antarctica is actually the world's largest desert!"
            }
        ];

        const grid = document.getElementById('featureGrid');
        const aiInput = document.getElementById('aiInput');
        const aiResponse = document.getElementById('aiResponse');

        // Logic to show all features
        function renderFeatures(filter = "") {
            grid.innerHTML = "";
            const filtered = features.filter(f => 
                f.title.toLowerCase().includes(filter.toLowerCase()) ||
                f.description.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = 'feature-card';
                card.innerHTML = `
                    <div class="feature-info">
                        <span class="tag category-${f.category}">${f.category}</span>
                        <h2>${f.title}</h2>
                        <p>${f.description}</p>
                        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                        <p style="font-size:0.85rem; font-style:italic;"><strong>Fun Fact:</strong> ${f.fact}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // "AI Assistant" Logic
        aiInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            // Filter the grid based on what user types
            renderFeatures(query);

            // Simulated AI responses
            if (query.length > 2) {
                aiResponse.style.display = "block";
                
                // Find a match for the "Assistant" to talk about
                const match = features.find(f => f.title.toLowerCase().includes(query));
                
                if (match) {
                    aiResponse.innerHTML = `<strong>Assistant:</strong> I see you are interested in ${match.title}! Did you know? ${match.fact}`;
                } else {
                    aiResponse.innerHTML = `<strong>Assistant:</strong> I'm searching my nature database for "${query}"... keep typing to find specific features!`;
                }
            } else {
                aiResponse.style.display = "none";
            }
        });

        // Initialize the page
        renderFeatures();
    </script>
</body>
</html>
