<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthly - Ryzen James Ruzige</title>
    <style>
        :root {
            --nature-green: #2ecc71;
            --ocean-blue: #3498db;
            --earth-brown: #e67e22;
            --sky-purple: #9b59b6;
            --ice-blue: #1abc9c;
            --lava-red: #e74c3c;
            --bg: #f8faf8;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --ryzen-gold: #f1c40f;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.5s ease;
        }

        /* Theater Mode Overlay Effect */
        body.theater-mode {
            background-color: #050a05;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            width: 100%;
            padding: 120px 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            transition: opacity 0.5s;
        }

        .theater-mode header { opacity: 0.2; }

        header h1 { font-size: 3.5rem; margin: 0; letter-spacing: -1px; }
        
        .owner-badge {
            background: var(--nature-green);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-block;
            margin-top: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .ai-box {
            background: white;
            width: 90%;
            max-width: 850px;
            margin: -60px auto 40px;
            padding: 35px;
            border-radius: 28px;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 10;
            text-align: center;
            transition: transform 0.5s;
        }

        .theater-mode .ai-box { transform: translateY(-20px); opacity: 0.3; pointer-events: none; }

        .owner-intro {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .owner-intro h2 { font-size: 1.8rem; color: #1a2a1a; margin-bottom: 5px; }
        .owner-intro p { color: var(--nature-green); font-weight: 600; font-size: 1.1rem; }

        .input-group {
            display: flex;
            gap: 12px;
        }

        #aiInput {
            flex-grow: 1;
            padding: 18px 24px;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        #aiInput:focus { border-color: var(--nature-green); background: #f9fff9; }

        #askBtn {
            background: var(--nature-green);
            color: white;
            border: none;
            padding: 0 32px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .timeline-section {
            width: 90%;
            max-width: 1200px;
            margin-bottom: 80px;
        }

        .section-title h3 {
            font-size: 2.2rem;
            color: #1a2a1a;
            border-bottom: 4px solid var(--nature-green);
            display: inline-block;
            padding-bottom: 10px;
        }

        .theater-mode .section-title h3 { color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .feature-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease, z-index 0s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .feature-card.active-video {
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(1.02);
        }

        .media-container {
            width: 100%;
            height: 220px;
            position: relative;
            background: #000;
        }

        .feature-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .video-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(46, 204, 113, 0.95);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 5;
            transition: 0.2s;
        }

        .video-btn:hover { background: white; color: var(--nature-green); transform: translate(-50%, -50%) scale(1.1); }

        .close-video-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 2px solid white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            z-index: 10;
            font-weight: bold;
        }

        .video-player {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .feature-info { padding: 20px; flex-grow: 1; }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .category-water { background: var(--ocean-blue); }
        .category-land { background: var(--earth-brown); }
        .category-ice { background: var(--ice-blue); }
        .category-tectonic { background: var(--lava-red); }

        footer {
            width: 100%;
            padding: 60px 20px;
            background: #0f170f;
            color: white;
            text-align: center;
            border-top: 5px solid var(--nature-green);
        }

        .footer-logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; color: white; }
        .footer-logo span { color: var(--nature-green); }
    </style>
</head>
<body>

    <header id="mainHeader">
        <h1>Nature's Masterpieces</h1>
        <div class="owner-badge">Curated by Ryzen James Ruzige</div>
    </header>

    <div class="ai-box">
        <div class="owner-intro">
            <h2>The Explorer's Portal</h2>
            <p>Discover the Earth with Ryzen James Ruzige</p>
        </div>
        <div class="input-group">
            <input type="text" id="aiInput" placeholder="Search for a wonder (e.g. 'Everest')...">
            <button id="askBtn" onclick="handleSearch()">Explore</button>
        </div>
    </div>

    <div id="timelineContainer"></div>

    <footer>
        <div class="footer-logo">RYZEN <span>GRAPHICS</span></div>
        <div class="footer-tagline">Visualizing the Natural World</div>
        <div style="width: 50px; height: 2px; background: var(--nature-green); margin: 20px auto;"></div>
        <p class="owner-name">Design & Content by Ryzen James Ruzige</p>
        <p style="font-size: 0.8rem; color: #555; margin-top: 10px;">&copy; 2026 All Rights Reserved</p>
    </footer>

    <script>
        const featureData = [
            {
                section: "Colossal Summits",
                items: [
                    { title: "Mount Everest", location: "Nepal/China", category: "land", image: "https://images.unsplash.com/photo-1544735716-392fe2489ffa?auto=format&fit=crop&w=600&q=80", video: "https://www.youtube.com/embed/5mEExvS2TfQ", description: "The highest point on Earth, standing at 29,032 feet above sea level.", fact: "It grows about 4mm taller every year due to tectonic shifts." },
                    { title: "Mount Kilimanjaro", location: "Tanzania", category: "land", image: "https://images.unsplash.com/photo-1589553416260-1710c9164088?auto=format&fit=crop&w=600&q=80", video: "https://www.youtube.com/embed/p98v1IuU_w0", description: "The highest free-standing mountain in the world and a dormant volcano.", fact: "It has three volcanic cones: Kibo, Mawenzi, and Shira." }
                ]
            },
            {
                section: "Aquatic Marvels",
                items: [
                    { title: "Great Barrier Reef", location: "Australia", category: "water", image: "https://images.unsplash.com/photo-1582967788606-a171c1080cb0?auto=format&fit=crop&w=600&q=80", video: "https://www.youtube.com/embed/wbNeIn3vVKM", description: "The world's largest coral reef system, visible even from outer space.", fact: "It is composed of over 2,900 individual reefs." },
                    { title: "Victoria Falls", location: "Zambia/Zimbabwe", category: "water", image: "https://images.unsplash.com/photo-1629124403816-1f7292211e93?auto=format&fit=crop&w=600&q=80", video: "https://www.youtube.com/embed/nshV_yX5oQk", description: "Known as 'The Smoke That Thunders', it is the largest curtain of falling water.", fact: "The noise of the water can be heard from 40km away." }
                ]
            },
            {
                section: "Deep Earth & Ice",
                items: [
                    { title: "Grand Canyon", location: "Arizona, USA", category: "tectonic", image: "https://images.unsplash.com/photo-1474044159687-1ee9f3a51722?auto=format&fit=crop&w=600&q=80", video: "https://www.youtube.com/embed/oP9S6Y-jOqI", description: "A massive gorge carved by the Colorado River over millions of years.", fact: "The canyon exposes nearly two billion years of Earth's history." },
                    { title: "Perito Moreno Glacier", location: "Argentina", category: "ice", image: "https://images.unsplash.com/photo-1513028738826-f083face353e?auto=format&fit=crop&w=600&q=80", video: "https://www.youtube.com/embed/yVvUshdY3kE", description: "One of the few glaciers in the world that is actually still growing.", fact: "It is the world's third largest reserve of fresh water." }
                ]
            }
        ];

        function playVideo(btn, videoUrl) {
            const card = btn.closest('.feature-card');
            const container = btn.parentElement;
            const img = container.querySelector('.feature-img');
            const iframe = container.querySelector('.video-player');
            const closeBtn = container.querySelector('.close-video-btn');
            
            // UI Enhancement: Theater Mode & Scroll
            document.body.classList.add('theater-mode');
            card.classList.add('active-video');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });

            btn.style.display = 'none';
            img.style.display = 'none';
            closeBtn.style.display = 'block';
            iframe.src = videoUrl + "?autoplay=1&rel=0";
            iframe.style.display = 'block';
        }

        function stopVideo(closeBtn) {
            const card = closeBtn.closest('.feature-card');
            const container = closeBtn.parentElement;
            const img = container.querySelector('.feature-img');
            const iframe = container.querySelector('.video-player');
            const playBtn = container.querySelector('.video-btn');
            
            document.body.classList.remove('theater-mode');
            card.classList.remove('active-video');

            closeBtn.style.display = 'none';
            iframe.src = "";
            iframe.style.display = 'none';
            img.style.display = 'block';
            playBtn.style.display = 'flex';
        }

        function render(filter = "") {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = "";
            const term = filter.toLowerCase();
            
            featureData.forEach((sec, sIdx) => {
                const items = sec.items.filter(i => i.title.toLowerCase().includes(term));
                if (items.length > 0) {
                    const s = document.createElement('div');
                    s.className = 'timeline-section';
                    s.innerHTML = `<div class="section-title"><h3>${sec.section}</h3></div>`;
                    const g = document.createElement('div');
                    g.className = 'grid';
                    
                    items.forEach((i, iIdx) => {
                        g.innerHTML += `
                            <div class="feature-card">
                                <div class="media-container">
                                    <button class="close-video-btn" onclick="stopVideo(this)">✕</button>
                                    <button class="video-btn" onclick="playVideo(this, '${i.video}')">
                                        <span>▶</span> Watch Video
                                    </button>
                                    <div class="feature-img" style="background-image:url('${i.image}')"></div>
                                    <iframe class="video-player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                                </div>
                                <div class="feature-info">
                                    <span class="tag category-${i.category}">${i.category}</span>
                                    <span style="display:block; font-size:0.8rem; color:#888;">${i.location}</span>
                                    <h4>${i.title}</h4>
                                    <p>${i.description}</p>
                                    <p style="font-size:0.8rem; color:var(--nature-green); margin-top:15px;"><strong>Fact:</strong> ${i.fact}</p>
                                </div>
                            </div>`;
                    });
                    s.appendChild(g);
                    container.appendChild(s);
                }
            });
        }

        function handleSearch() {
            render(document.getElementById('aiInput').value);
        }

        window.onload = () => render();
    </script>
</body>
</html>
