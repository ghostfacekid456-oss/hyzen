<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthly - AI Nature Guide</title>
    <style>
        :root {
            --nature-green: #27ae60;
            --ocean-blue: #2980b9;
            --earth-brown: #795548;
            --sky-purple: #8e44ad;
            --ice-blue: #00bcd4;
            --lava-red: #e67e22;
            --bg: #f0f4f0;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            width: 100%;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .ai-box {
            background: white;
            width: 90%;
            max-width: 800px;
            margin: -40px auto 30px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--nature-green);
            font-weight: bold;
        }

        .ai-avatar {
            width: 40px;
            height: 40px;
            background: var(--nature-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #aiInput {
            flex-grow: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #aiInput:focus { border-color: var(--nature-green); }

        #askBtn {
            background: var(--nature-green);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #aiResponse {
            margin-top: 20px;
            padding: 20px;
            background: #fdfdfd;
            border-radius: 12px;
            border-left: 5px solid var(--nature-green);
            display: none;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .timeline-section {
            width: 95%;
            max-width: 1400px;
            margin-bottom: 40px;
        }

        .section-title {
            padding: 10px 20px;
            background: #fff;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 8px solid var(--nature-green);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .feature-card {
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            border: 1px solid #eee;
            overflow: hidden;
        }

        .feature-card:hover { transform: translateY(-5px); }
        .feature-info { padding: 20px; flex-grow: 1; }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .category-water { background: var(--ocean-blue); }
        .category-land { background: var(--earth-brown); }
        .category-phenomena { background: var(--sky-purple); }
        .category-ice { background: var(--ice-blue); }
        .category-tectonic { background: var(--lava-red); }

        h2 { margin: 5px 0 10px; font-size: 1.1rem; color: var(--text); }
        .location { font-size: 0.75rem; color: #888; margin-bottom: 8px; display: block; }
        p { color: #555; line-height: 1.5; font-size: 0.85rem; margin: 5px 0; }

        .scientific-fact {
            font-size: 0.75rem;
            border-top: 1px solid #f0f0f0;
            margin-top: 10px;
            padding-top: 10px;
            font-style: italic;
            color: #666;
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 40px 20px;
            background: #fff;
            color: #888;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <h1>Earthly Nature Guide</h1>
        <p>A Chronological Explorer of 100+ Advanced Natural Wonders</p>
    </header>

    <div class="ai-box">
        <div class="ai-header">
            <div class="ai-avatar">🌿</div>
            <span>Nature Expert AI</span>
        </div>
        <div class="input-group">
            <input type="text" id="aiInput" placeholder="Search by name (e.g. Mariana Trench, Blood Falls)...">
            <button id="askBtn">Ask Expert</button>
        </div>
        <div id="aiResponse"></div>
    </div>

    <div id="timelineContainer"></div>

    <footer>
        &copy; 2024 Earthly Nature Project - Educational Resource for Students
    </footer>

    <script>
        const featureData = [
            {
                section: "I. Advanced Geological & Tectonic Features",
                items: [
                    { title: "San Andreas Fault", location: "USA", category: "tectonic", description: "A major transform boundary between the Pacific and North American plates.", fact: "The fault is moving at about the rate your fingernails grow.", keywords: ["san andreas", "fault"] },
                    { title: "Great Rift Valley", location: "Africa", category: "tectonic", description: "A massive geological rift system formed by the divergence of tectonic plates.", fact: "It is one of the only geological features visible from outer space.", keywords: ["rift valley"] },
                    { title: "Mariana Trench", location: "Pacific Ocean", category: "water", description: "The deepest part of the world's oceans, formed by subduction.", fact: "The pressure at the bottom is over 1,000 times standard atmospheric pressure.", keywords: ["mariana", "trench"] },
                    { title: "Mid-Atlantic Ridge", location: "Atlantic Ocean", category: "tectonic", description: "A massive underwater mountain range formed by a divergent plate boundary.", fact: "It is the longest mountain range on Earth, spanning 10,000 miles.", keywords: ["mid-atlantic", "ridge"] },
                    { title: "Himalayan Orogen", location: "Asia", category: "tectonic", description: "The ongoing mountain-building process caused by continental collision.", fact: "The collision started 50 million years ago and is still active today.", keywords: ["himalayan", "mountains"] }
                ]
            },
            {
                section: "II. Geothermal, Volcanic, & Seismic Wonders",
                items: [
                    { title: "Yellowstone Caldera", location: "USA", category: "tectonic", description: "A supervolcano hotspot responsible for massive geothermal activity.", fact: "The underground magma chamber is estimated to be 37 miles long.", keywords: ["yellowstone", "caldera"] },
                    { title: "Kawah Ijen Crater", location: "Indonesia", category: "tectonic", description: "A volcanic crater famous for its electric blue flames.", fact: "The 'blue lava' is actually burning sulfur gas reaching 600°C.", keywords: ["kawah ijen", "blue fire"] },
                    { title: "Stromboli Volcano", location: "Italy", category: "tectonic", description: "Known as the 'Lighthouse of the Mediterranean' for its constant eruptions.", fact: "It has been erupting almost non-stop for over 2,000 years.", keywords: ["stromboli"] },
                    { title: "Dallol Hydrothermal Field", location: "Ethiopia", category: "phenomena", description: "An otherworldly landscape of salt chimneys and acid ponds.", fact: "It has the highest average temperature of any inhabited place on Earth.", keywords: ["dallol"] }
                ]
            },
            {
                section: "III. Canyons, Caves, & Karst Landscapes",
                items: [
                    { title: "Hang Sơn Đoòng", location: "Vietnam", category: "land", description: "The world's largest known cave passage, featuring its own ecosystem.", fact: "A Boeing 747 could fly through the largest parts of the cave.", keywords: ["son doong", "cave"] },
                    { title: "Marble Caves", location: "Chile", category: "land", description: "Azure-colored marble sculpted by wave action on General Carrera Lake.", fact: "The calcium carbonate walls have been polished by water for 6,000 years.", keywords: ["marble caves"] },
                    { title: "Cenote Angelita", location: "Mexico", category: "water", description: "A cenote with a unique underwater river effect.", fact: "The 'river' is a layer of hydrogen sulfide gas between fresh and salt water.", keywords: ["cenote", "angelita"] },
                    { title: "Cave of the Crystals", location: "Mexico", category: "land", description: "Contains giant selenite crystals, some of the largest ever found.", fact: "The humidity in the cave is nearly 100% and it stays around 58°C.", keywords: ["crystals", "naica"] }
                ]
            },
            {
                section: "IV. Unique Sedimentary & Erosional Landforms",
                items: [
                    { title: "Zhangye Danxia", location: "China", category: "land", description: "'Rainbow Mountains' formed from layers of colored sandstone.", fact: "The colors look like a painting but are natural mineral deposits.", keywords: ["danxia", "rainbow"] },
                    { title: "Giant's Causeway", location: "Northern Ireland", category: "land", description: "40,000 interlocking basalt columns from ancient volcanic activity.", fact: "Most of the columns are perfectly hexagonal.", keywords: ["giants causeway", "basalt"] },
                    { title: "Salar de Uyuni", location: "Bolivia", category: "land", description: "The world's largest salt flat, formed by evaporated prehistoric lakes.", fact: "When covered in water, it becomes the world's largest natural mirror.", keywords: ["uyuni", "salt flat"] }
                ]
            },
            {
                section: "V. Glacial & Polar Landscapes",
                items: [
                    { title: "Antarctic Ice Sheet", location: "Antarctica", category: "ice", description: "The largest single mass of ice on Earth.", fact: "It contains enough water to raise global sea levels by 190 feet.", keywords: ["antarctic", "ice"] },
                    { title: "Perito Moreno Glacier", location: "Argentina", category: "ice", description: "One of the few glaciers in the world that is still advancing.", fact: "It is the world's third largest reserve of fresh water.", keywords: ["perito moreno"] },
                    { title: "Vatnajökull Ice Cap", location: "Iceland", category: "ice", description: "The largest glacier in Europe by volume.", fact: "Active volcanoes like Grímsvötn lie directly beneath the ice.", keywords: ["vatnajokull"] }
                ]
            },
            {
                section: "VI. Marine, Coastal, & Aquatic Phenomena",
                items: [
                    { title: "Great Blue Hole", location: "Belize", category: "water", description: "A massive underwater sinkhole formed during past ice ages.", fact: "It is over 400 feet deep and circular in shape.", keywords: ["blue hole"] },
                    { title: "Bioluminescent Bay", location: "Puerto Rico", category: "phenomena", description: "A bay where water glows blue when disturbed.", fact: "The light is a defense mechanism for tiny organisms called dinoflagellates.", keywords: ["bioluminescent"] },
                    { title: "Underwater Waterfall", location: "Mauritius", category: "phenomena", description: "An optical illusion created by sand deposits.", fact: "It is actually sand being pushed off an underwater shelf by currents.", keywords: ["mauritius", "waterfall"] }
                ]
            },
            {
                section: "VII. Desert & Arid Landscape Features",
                items: [
                    { title: "Atacama Desert", location: "Chile", category: "land", description: "The driest non-polar desert in the world.", fact: "Some weather stations here have never recorded a drop of rain.", keywords: ["atacama"] },
                    { title: "Skeleton Coast", location: "Namibia", category: "land", description: "Where sand dunes meet the Atlantic, littered with shipwrecks.", fact: "The thick ocean fogs make it one of the most dangerous coasts.", keywords: ["skeleton coast"] },
                    { title: "White Sands", location: "USA", category: "land", description: "The world's largest gypsum dunefield.", fact: "Gypsum doesn't absorb heat, so you can walk on it barefoot even in summer.", keywords: ["white sands"] }
                ]
            },
            {
                section: "VIII. Rainforest, Forest, & Ecological Marvels",
                items: [
                    { title: "Amazon Rainforest", location: "South America", category: "land", description: "The world's largest tropical rainforest.", fact: "One in ten known species on Earth lives in the Amazon.", keywords: ["amazon"] },
                    { title: "Pando Aspen Grove", location: "USA", category: "land", description: "A massive clonal colony of a single quaking aspen tree.", fact: "The entire forest shares a single underground root system.", keywords: ["pando", "aspen"] },
                    { title: "Sequoia National Park", location: "USA", category: "land", description: "Home to the world's largest trees by volume.", fact: "General Sherman is the largest known living single-stem tree on Earth.", keywords: ["sequoia"] }
                ]
            },
            {
                section: "IX. Rare & Unique Phenomena",
                items: [
                    { title: "Catatumbo Lightning", location: "Venezuela", category: "phenomena", description: "Lightning strikes continuously for hours, 300 nights a year.", fact: "It acts as a natural lighthouse for sailors in the region.", keywords: ["catatumbo", "lightning"] },
                    { title: "Aurora Borealis", location: "Polar Regions", category: "phenomena", description: "Light displays caused by solar wind hitting the atmosphere.", fact: "The different colors indicate different types of gas particles.", keywords: ["aurora", "northern lights"] },
                    { title: "Blood Falls", location: "Antarctica", category: "phenomena", description: "Iron-oxide-rich saltwater flowing from a glacier.", fact: "The water turns red when it touches oxygen in the air.", keywords: ["blood falls"] }
                ]
            },
            {
                section: "X. Rivers, Lakes, & Complex Water Systems",
                items: [
                    { title: "Lake Baikal", location: "Russia", category: "water", description: "The deepest, oldest, and most voluminous freshwater lake.", fact: "If all other freshwater dried up, Baikal could supply the world for 40 years.", keywords: ["baikal"] },
                    { title: "Victoria Falls", location: "Africa", category: "water", description: "One of the largest waterfalls in the world.", fact: "Local tribes call it 'Mosi-oa-Tunya' or 'The Smoke That Thunders'.", keywords: ["victoria falls"] },
                    { title: "Lake Titicaca", location: "Peru/Bolivia", category: "water", description: "The highest navigable lake in the world.", fact: "It sits at an altitude of 12,507 feet above sea level.", keywords: ["titicaca"] }
                ]
            }
        ];

        const container = document.getElementById('timelineContainer');
        const aiInput = document.getElementById('aiInput');
        const askBtn = document.getElementById('askBtn');
        const aiResponse = document.getElementById('aiResponse');

        function renderTimeline(filter = "") {
            container.innerHTML = "";
            const searchTerm = filter.toLowerCase().trim();

            featureData.forEach(section => {
                const filteredItems = section.items.filter(item => 
                    item.title.toLowerCase().includes(searchTerm) ||
                    item.description.toLowerCase().includes(searchTerm) ||
                    item.keywords.some(k => k.includes(searchTerm))
                );

                if (filteredItems.length > 0) {
                    const sectionEl = document.createElement('div');
                    sectionEl.className = 'timeline-section';
                    sectionEl.innerHTML = `<div class="section-title"><h3>${section.section}</h3></div>`;
                    
                    const gridEl = document.createElement('div');
                    gridEl.className = 'grid';

                    filteredItems.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'feature-card';
                        card.innerHTML = `
                            <div class="feature-info">
                                <span class="tag category-${item.category}">${item.category}</span>
                                <span class="location">${item.location}</span>
                                <h2>${item.title}</h2>
                                <p>${item.description}</p>
                                <p class="scientific-fact"><strong>Scientific Fact:</strong> ${item.fact}</p>
                            </div>
                        `;
                        gridEl.appendChild(card);
                    });

                    sectionEl.appendChild(gridEl);
                    container.appendChild(sectionEl);
                }
            });
        }

        function handleAI() {
            const query = aiInput.value.toLowerCase().trim();
            if (!query) return;

            aiResponse.style.display = "block";
            aiResponse.innerHTML = "<em>Accessing geological records...</em>";

            setTimeout(() => {
                let foundMatch = null;
                featureData.forEach(section => {
                    const match = section.items.find(item => 
                        query.includes(item.title.toLowerCase()) || 
                        item.keywords.some(k => query.includes(k))
                    );
                    if (match) foundMatch = match;
                });

                if (foundMatch) {
                    aiResponse.innerHTML = `
                        <strong>Expert Response:</strong> You are asking about the <strong>${foundMatch.title}</strong>! 
                        <br><br>
                        This is a <strong>${foundMatch.category}</strong> wonder found in <strong>${foundMatch.location}</strong>. 
                        ${foundMatch.description} 
                        <br><br>
                        <strong>Discovery Fact:</strong> ${foundMatch.fact}
                    `;
                } else {
                    aiResponse.innerHTML = `
                        <strong>Expert Response:</strong> I don't see a specific record for that, but I can tell you about 
                        <strong>Plate Tectonics, Glacial Advancement, or Atmospheric Phenomena</strong>. 
                        Try searching for names like "Mariana Trench" or "Blood Falls".
                    `;
                }
                renderTimeline(query);
            }, 600);
        }

        askBtn.addEventListener('click', handleAI);
        aiInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAI(); });

        renderTimeline();
    </script>
</body>
</html>
